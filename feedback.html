<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Відгук | Ресторан "Татуй"</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Ресторан "Татуй"</h1>
        <nav>
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="menu.html">Меню</a></li>
                <li><a href="booking.html">Бронювання</a></li>
                <li><a href="feedback.html" aria-current="page">Відгук</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Залиште відгук</h2>
            <p>Ми будемо вдячні за ваші коментарі про обслуговування, страви та атмосферу.</p>

            <form class="feedback-form" action="#" method="POST">
                <div class="form-field">
                    <label for="userName">Ваше ім'я:</label>
                    <input type="text" id="userName" name="userName" required>
                </div>

                <div class="form-field">
                    <label for="userEmail">Email:</label>
                    <input type="email" id="userEmail" name="userEmail" required>
                </div>

                <div class="form-field">
                    <label for="comments">Ваш відгук:</label>
                    <textarea id="comments" name="comments" rows="5" required></textarea>
                </div>

                <button type="submit">Відправити</button>
            </form>
        </section>
    </main>

    <footer>
        <address>
            <p>м. Кам'янець-Подільський, вул. Соборна, 12</p>
        </address>
    </footer>
</body>
</html>
